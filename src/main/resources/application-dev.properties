# ── Database (MySQL - Dev) ────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/eap_dev?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=dev_secret_key_change_before_production_use
app.jwt.access-token-expiry-ms=86400000

# ── Mail ──────────────────────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_app_password_here
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Cloudinary ────────────────────────────────────────────────────────────────
cloudinary.cloud-name=your_cloud_name_here
cloudinary.api-key=your_api_key_here
cloudinary.api-secret=your_api_secret_here

# ── App URLs ──────────────────────────────────────────────────────────────────
app.frontend-url=http://localhost:4200

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.automobileproject.eap=DEBUG
logging.level.org.springframework.security=DEBUG
