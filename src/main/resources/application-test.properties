# ── Database (H2 in-memory for tests) ─────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:eap_test
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=test_secret_key_32_chars_minimum00
app.jwt.access-token-expiry-ms=3600000

# ── Mail (disabled in tests) ──────────────────────────────────────────────────
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test@test.com
spring.mail.password=test

# ── Cloudinary (placeholder in tests) ────────────────────────────────────────
cloudinary.cloud-name=test
cloudinary.api-key=test
cloudinary.api-secret=test

# ── App URLs ──────────────────────────────────────────────────────────────────
app.frontend-url=http://localhost:4200

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.automobileproject.eap=DEBUG
